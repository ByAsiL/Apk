name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo dosyalarını al
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK hazırla
        uses: android-actions/setup-android@v3

      - name: Android platformlarını kur
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Dağınık dosyaları Android proje yapısına taşı
        run: |
          mkdir -p app/src/main/java/com/ihalekayit/paneli
          mkdir -p app/src/main/assets/www/icons
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          cp MainActivity.java app/src/main/java/com/ihalekayit/paneli/MainActivity.java
          cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          cp styles.xml app/src/main/res/values/styles.xml

          cp index.html app/src/main/assets/www/index.html
          cp manifest.json app/src/main/assets/www/manifest.json
          cp service-worker.js app/src/main/assets/www/service-worker.js

          if [ -f icon-192.png ]; then cp icon-192.png app/src/main/assets/www/icons/icon-192.png; fi
          if [ -f icon-512.png ]; then cp icon-512.png app/src/main/assets/www/icons/icon-512.png; fi
          if [ -f icon_192.png ]; then cp icon_192.png app/src/main/res/drawable/icon_192.png; fi
          if [ -f icon-192.png ]; then cp icon-192.png app/src/main/res/drawable/icon_192.png; fi

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'IhaleKayitPaneli'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.ihalekayit.paneli'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.ihalekayit.paneli'
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
          }
          EOF

      - name: APK oluştur
        run: gradle assembleDebug

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: ihale-paneli-apk
          path: app/build/outputs/apk/debug/app-debug.apk
